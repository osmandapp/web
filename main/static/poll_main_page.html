<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OsmAnd Main Page Poll</title>

<style>
:root {
    --osmand-orange: #f47c20;
    --osmand-orange-hover: #e06b12;
    --osmand-orange-bg: #fff5ee;
    --bg-main: #f8f9fa;
    --text-dark: #1c1c1e;
    --text-muted: #636366;
    --border-color: #e5e5ea;
    --correct-green: #34c759;
}

*{
    box-sizing: border-box;
}

body{
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-main);
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
}

.container{
    max-width: 720px;
    margin: 60px auto;
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.04);
}

.quiz-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
}

.mascot-box {
    flex-shrink: 0;
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--osmand-orange-bg);
    border: 3px solid var(--osmand-orange);
    border-radius: 50%;
    font-size: 42px;
    box-shadow: 0 4px 12px rgba(244, 124, 32, 0.15);
    animation: bounce 2.5s infinite ease-in-out;
}

.header-text {
    flex-grow: 1;
}

h1{
    font-size: 24px;
    font-weight: 700;
    color: var(--text-dark);
    margin: 0 0 6px 0;
    letter-spacing: -0.5px;
}

.subtitle{
    color: var(--text-muted);
    font-size: 15px;
    margin: 0;
}

.progress-wrapper{
    width: 100%;
    height: 6px;
    background: var(--border-color);
    border-radius: 10px;
    overflow: hidden;
    margin: 30px 0;
    display: none;
}

.progress{
    height: 100%;
    width: 0%;
    background: var(--osmand-orange);
    border-radius: 10px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.question-number{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    color: var(--osmand-orange);
    margin-bottom: 12px;
}

.question-title{
    font-size: 20px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 10px;
    color: var(--text-dark);
}

.question-hint{
    color: var(--text-muted);
    margin-bottom: 24px;
    font-size: 14px;
    font-style: italic;
}

.option{
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1.4;
    background: white;
    transition: all 0.2s ease;
}

.option:hover{
    border-color: var(--osmand-orange);
    background: var(--osmand-orange-bg);
    transform: translateY(-1px);
}

.option.selected{
    border-color: var(--osmand-orange);
    background: var(--osmand-orange-bg);
    font-weight: 500;
    box-shadow: inset 0 0 0 1px var(--osmand-orange);
}

/* Специфічний стиль для чекбоксів (multi) щоб візуально підказати користувачу */
.quiz-layout[data-type="multi"] .option.selected {
    border-color: #007aff;
    background: #f2f8ff;
    box-shadow: inset 0 0 0 1px #007aff;
}

.other-input-container {
    display: none;
    margin-top: -4px;
    margin-bottom: 16px;
    animation: slideUp 0.2s ease;
}

.other-input-container input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--osmand-orange);
    border-radius: 10px;
    font-size: 15px;
    outline: none;
}

button.action-btn {
    background: var(--osmand-orange);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    width: 100%;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(244, 124, 32, 0.15);
}

button.action-btn:hover{
    background: var(--osmand-orange-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(244, 124, 32, 0.25);
}

.feedback{
    margin-top: 24px;
    padding: 24px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 15px;
    animation: slideUp 0.3s ease;
}

.feedback strong {
    font-size: 18px;
    display: block;
    margin-bottom: 6px;
}

.thanks-feedback{
    background: #e6f9ed;
    color: #147029;
    border: 1px solid #bbf2c7;
}

.start-screen, .result-screen {
    text-align: center;
    animation: fadeIn 0.5s ease;
}

.start-screen .mascot-box, .result-screen .mascot-box {
    width: 110px;
    height: 110px;
    margin: 0 auto 20px auto;
}

.start-screen .mascot-box {
    background: var(--osmand-orange-bg);
    border-color: var(--osmand-orange);
}

.result-screen .mascot-box {
    background: #e6f9ed;
    border-color: var(--correct-green);
}

.start-description {
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1.5;
    margin: 16px auto 28px auto;
    max-width: 500px;
}

.language-selector {
    max-width: 500px;
    margin: 0 auto 22px auto;
    text-align: left;
}

body[dir="rtl"] .language-selector {
    text-align: right;
}

.language-selector label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-dark);
}

.language-selector select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background-color: white;
    font-size: 15px;
    outline: none;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@media(max-width:700px){
    .container{ padding: 24px 16px; margin: 0; border-radius: 0; min-height: 100vh; }
    .quiz-header { flex-direction: column; text-align: center; gap: 12px; }
    h1 { font-size: 22px; }
}
</style>
</head>

<div class="container">

    <div class="quiz-header" id="quizHeader" style="display: none;">
        <div class="mascot-box" id="mascotContainer">📊</div>
        <div class="header-text">
            <h1 id="headerTitle"></h1>
            <p class="subtitle" id="headerSubtitle"></p>
        </div>
    </div>

    <div class="progress-wrapper" id="progressWrapper">
        <div class="progress" id="progress"></div>
    </div>

    <!-- START SCREEN -->
    <div class="start-screen" id="startScreen">
        <div class="language-selector">
            <label for="languageSelect" id="languageLabel"></label>
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="it">Italiano</option>

                <option value="tr">Türkçe</option>
                <option value="uk">Українська</option>
                <option value="ar">العربية</option>
            </select>
        </div>
        <div class="mascot-box">📊</div>
        <h1 id="startTitle"></h1>
        <p class="start-description" id="startDescription"></p>
        <button class="action-btn" id="startButton" onclick="startQuiz()"></button>
    </div>

    <div id="quiz" style="display: none;"></div>

    <!-- RESULT SCREEN -->
    <div class="result-screen" id="resultScreen" style="display: none;">
        <div class="mascot-box" id="mascotResultContainer">🙏</div>
        <h1 id="resultTitle"></h1>
        <p id="resultDefault" style="color: var(--text-muted); font-size: 16px; margin-bottom: 24px;"></p>
        <button class="action-btn" id="restartButton" onclick="restartQuiz()"></button>
    </div>

</div>

let selectedLanguage = localStorage.getItem("osmandMainPollLanguage") || "en";
let questions = QUESTION_BANK[selectedLanguage] || QUESTION_BANK.en;
let currentQuestion = 0;

function t(key) {
    const ui = UI_TRANSLATIONS[selectedLanguage] || UI_TRANSLATIONS.en;
    return ui[key] || UI_TRANSLATIONS.en[key] || key;
}

function formatText(template, values) {
    return String(template).replace(/\{(\w+)\}/g, (_, key) => values[key] ?? "");
}

function applyLanguage() {
    questions = QUESTION_BANK[selectedLanguage] || QUESTION_BANK.en;
    const isRtl = selectedLanguage === "ar";
    document.documentElement.lang = selectedLanguage;
    document.documentElement.dir = isRtl ? "rtl" : "ltr";
    
    const langSelect = document.getElementById("languageSelect");
    if (langSelect) langSelect.value = selectedLanguage;

    document.getElementById("headerTitle").innerHTML = t("headerTitle");
    document.getElementById("headerSubtitle").innerHTML = t("headerSubtitle");
    document.getElementById("languageLabel").innerHTML = t("languageLabel");
    document.getElementById("startTitle").innerHTML = t("startTitle");
    document.getElementById("startDescription").innerHTML = t("startDescription");
    document.getElementById("startButton").innerHTML = t("startQuiz");
    document.getElementById("resultTitle").innerHTML = t("resultTitle");
    document.getElementById("resultDefault").innerHTML = t("resultDefault");
    document.getElementById("restartButton").innerHTML = t("restartQuiz");
}

function changeLanguage(language) {
    selectedLanguage = language;
    localStorage.setItem("osmandMainPollLanguage", selectedLanguage);
    applyLanguage();
}

function startQuiz() {
    if (typeof quizTrack === 'function') quizTrack('main_poll/start');
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("quizHeader").style.display = "flex";
    document.getElementById("progressWrapper").style.display = "block";
    document.getElementById("quiz").style.display = "block";
    renderQuestion();
}

function updateProgress(){
    const percent = (currentQuestion / questions.length) * 100;
    document.getElementById("progress").style.width = percent + "%";
}

function renderQuestion(){
    updateProgress();
    
    const mascotContainer = document.getElementById("mascotContainer");
    mascotContainer.innerHTML = "📊";
    mascotContainer.style.borderColor = "var(--osmand-orange)";
    mascotContainer.style.background = "var(--osmand-orange-bg)";
    
    const q = questions[currentQuestion];
    const hintText = q.type === "multi" ? t("hintMulti") : t("hintSingle");

    let html = `
    <div class="quiz-layout" data-type="${q.type}">
        <div class="question-number">${formatText(t("questionOf"), { current: currentQuestion + 1, total: questions.length })}</div>
        <div class="question-title">${q.title}</div>
        <div class="question-hint">${hintText}</div>
    `;

    q.options.forEach((option, index) => {
        html += `
        <div class="option" data-index="${index}" data-value="${option}">
        ${option}
        </div>
        `;
        
        if ((option.toLowerCase() === 'other' || option.toLowerCase() === 'andere' || option === 'Інше' || option === 'Otro' || option === 'Autre' || option === 'Altro' || option === 'Anders' || option === 'Inne' || option === 'Diğer' || option === 'غير ذلك') && q.type === 'single') {
            html += `
            <div class="other-input-container" id="otherInputContainer_${index}">
                <input type="text" id="otherTextInput" placeholder="${t('otherPlaceholder')}">
            </div>
            `;
        }
    });
    
    html += `<button class="action-btn" onclick="submitChoice()">${t("submitAnswer")}</button>`;
    html += `<div id="feedback"></div></div>`; 

    document.getElementById("quiz").innerHTML = html;
    attachOptionEvents(q.type);
}

function attachOptionEvents(type){
    const options = document.querySelectorAll(".option");
    options.forEach(option => {
        option.addEventListener("click", () => {
            const index = option.dataset.index;
            const otherContainer = document.getElementById(`otherInputContainer_${index}`);
            
            if (type === "single") {
                options.forEach(o => o.classList.remove("selected"));
                option.classList.add("selected");
                
                document.querySelectorAll(".other-input-container").forEach(c => c.style.display = "none");
                if (otherContainer) otherContainer.style.display = "block";
            } else {
                option.classList.toggle("selected");
            }
        });
    });
}

async function submitChoice(){
    const q = questions[currentQuestion];
    const selectedElements = document.querySelectorAll(".option.selected");
    if (selectedElements.length === 0) return;
    
    let selectedValues = [];
    let customTextValue = "";

    selectedElements.forEach(el => {
        selectedValues.push(el.dataset.value);
        const idx = el.dataset.index;
        const inputField = document.getElementById("otherTextInput");
        if (inputField && document.getElementById(`otherInputContainer_${idx}`)?.style.display === "block") {
            customTextValue = inputField.value.trim();
        }
    });
    
    if (typeof quizTrack === 'function') {
        quizTrack(`main_poll/q/${currentQuestion + 1}/answered?lang=${selectedLanguage}&value=${encodeURIComponent(selectedValues.join(','))}`);
    }
    
    if (customTextValue !== "" && GOOGLE_SHEETS_WEB_APP_URL !== "") {
        try {
            await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    date: new Date().toISOString(),
                    language: selectedLanguage,
                    question: q.title,
                    answer: customTextValue
                })
            });
        } catch (e) {
            console.error("Error sending data to Google Sheets", e);
        }
    }
    
    showFeedback();
}

function showFeedback(){
    const feedback = document.getElementById("feedback");
    feedback.className = "feedback thanks-feedback";
    const isLastQuestion = currentQuestion === questions.length - 1;

    document.getElementById("mascotContainer").innerHTML = "💚";
    document.getElementById("mascotContainer").style.borderColor = "var(--correct-green)";
    document.getElementById("mascotContainer").style.background = "#e6f9ed";

    feedback.innerHTML = `
    <strong>${t("thanksAnswer")}</strong>
    <button class="action-btn" style="margin-top:20px; background: #34c759; box-shadow: none;" onclick="nextQuestion()">
        ${isLastQuestion ? t("viewResults") : t("nextQuestion")}
    </button>
    `;
    
    const mainBtn = document.querySelector("#quiz .action-btn");
    if(mainBtn) mainBtn.style.display = 'none';
}

function nextQuestion(){
    currentQuestion++;
    if(currentQuestion >= questions.length){
        if (typeof quizTrack === 'function') quizTrack('main_poll/finish');
        document.getElementById("quizHeader").style.display = "none";
        document.getElementById("quiz").style.display = "none";
        document.getElementById("resultScreen").style.display = "block";
        document.getElementById("progress").style.width = "100%";
        return;
    }
    renderQuestion();
}

function restartQuiz(){
    currentQuestion = 0;
    document.getElementById("quizHeader").style.display = "none";
    document.getElementById("progressWrapper").style.display = "none";
    document.getElementById("quiz").style.display = "none";
    document.getElementById("resultScreen").style.display = "none";
    document.getElementById("startScreen").style.display = "block";
}

window.addEventListener("load", applyLanguage);
</script>
