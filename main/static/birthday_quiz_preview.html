<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OsmAnd Birthday Quiz</title>

<style>
:root {
    --osmand-orange: #f47c20;
    --osmand-orange-hover: #e06b12;
    --osmand-orange-bg: #fff5ee;
    --bg-main: #f8f9fa;
    --text-dark: #1c1c1e;
    --text-muted: #636366;
    --border-color: #e5e5ea;
    --correct-green: #34c759;
    --wrong-red: #ff3b30;
}

*{
    box-sizing: border-box;
}

body{
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-main);
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
}

.container{
    max-width: 720px;
    margin: 60px auto;
    background: white;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.04);
}

.quiz-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
}

/* Стильний тимчасовий кружечок для маскота (за замовчуванням Телескоп) */
.mascot-box {
    flex-shrink: 0;
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--osmand-orange-bg);
    border: 3px solid var(--osmand-orange);
    border-radius: 50%;
    font-size: 42px;
    box-shadow: 0 4px 12px rgba(244, 124, 32, 0.15);
    animation: bounce 2.5s infinite ease-in-out;
}

.header-text {
    flex-grow: 1;
}

h1{
    font-size: 24px;
    font-weight: 700;
    color: var(--text-dark);
    margin: 0 0 6px 0;
    letter-spacing: -0.5px;
}

.subtitle{
    color: var(--text-muted);
    font-size: 15px;
    margin: 0;
}

.progress-wrapper{
    width: 100%;
    height: 6px;
    background: var(--border-color);
    border-radius: 10px;
    overflow: hidden;
    margin: 30px 0;
    display: none; /* Ховаємо на старті, показуємо під час тесту */
}

.progress{
    height: 100%;
    width: 0%;
    background: var(--osmand-orange);
    border-radius: 10px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.question-number{
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    color: var(--osmand-orange);
    margin-bottom: 12px;
}

.question-title{
    font-size: 20px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 10px;
    color: var(--text-dark);
}

.question-hint{
    color: var(--text-muted);
    margin-bottom: 24px;
    font-size: 14px;
    font-style: italic;
}

/* Question image block: optimized for 640×230 images */
.hint-image-wrapper {
    width: 100%;
    aspect-ratio: 640 / 230;
    background: #f8f9fa;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
    border: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: center;
}

.hint-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.option{
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1.4;
    background: white;
    transition: all 0.2s ease;
}

.option:hover{
    border-color: var(--osmand-orange);
    background: var(--osmand-orange-bg);
    transform: translateY(-1px);
}

.option.selected{
    border-color: var(--osmand-orange);
    background: var(--osmand-orange-bg);
    font-weight: 500;
    box-shadow: inset 0 0 0 1px var(--osmand-orange);
}

button.action-btn {
    background: var(--osmand-orange);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    width: 100%;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(244, 124, 32, 0.15);
}

button.action-btn:hover{
    background: var(--osmand-orange-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(244, 124, 32, 0.25);
}

.feedback{
    margin-top: 24px;
    padding: 24px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 15px;
    animation: slideUp 0.3s ease;
}

.feedback strong {
    font-size: 18px;
    display: block;
    margin-bottom: 6px;
}

.correct{
    background: #e6f9ed;
    color: #147029;
    border: 1px solid #bbf2c7;
}

.wrong{
    background: #fdf2f2;
    color: #b42318;
    border: 1px solid #fecdca;
}

.match-row{
    margin-bottom: 14px;
    padding: 16px;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.match-row strong{
    font-size: 15px;
    font-weight: 600;
}

select{
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background-color: white;
    font-size: 15px;
    outline: none;
}

select:focus {
    border-color: var(--osmand-orange);
}

.sequence-item{
    background: white;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    align-items: center;
}

.sequence-item select{
    width: 80px;
    padding: 8px;
}

/* ЕКРАНИ СТАРТУ ТА ФІНІШУ */
.start-screen, .result-screen {
    text-align: center;
    animation: fadeIn 0.5s ease;
}

.start-screen .mascot-box, .result-screen .mascot-box {
    width: 110px;
    height: 110px;
    margin: 0 auto 20px auto;
}

.start-screen .mascot-box {
    background: var(--osmand-orange-bg);
    border-color: var(--osmand-orange);
}

.result-screen .mascot-box {
    background: #e6f9ed;
    border-color: var(--correct-green);
}

.start-description {
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1.5;
    margin: 16px auto 28px auto;
    max-width: 500px;
}

.deadline-box {
    max-width: 500px;
    margin: 0 auto 24px auto;
    padding: 16px 18px;
    border-radius: 14px;
    background: var(--osmand-orange-bg);
    border: 1px solid rgba(244, 124, 32, 0.25);
    color: var(--text-dark);
    text-align: left;
    font-size: 14px;
    line-height: 1.5;
}

.deadline-box strong {
    color: var(--osmand-orange);
}

.email-form {
    max-width: 500px;
    margin: 0 auto;
    text-align: left;
}

.email-form label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-dark);
}

.email-form input[type="email"] {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.email-form input[type="email"]:focus {
    border-color: var(--osmand-orange);
    box-shadow: 0 0 0 3px rgba(244, 124, 32, 0.12);
}

.email-note {
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.4;
}

.form-error {
    display: none;
    margin-top: 10px;
    color: #b42318;
    font-size: 14px;
    font-weight: 500;
}

.answer-warning {
    display: none;
    margin: 14px 0 0 0;
    padding: 12px 14px;
    color: #b42318;
    background: #fdf2f2;
    border: 1px solid #fecdca;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    text-align: left;
}

body[dir="rtl"] .answer-warning {
    text-align: right;
}

.reward-box {
    padding: 20px;
    border-radius: 14px;
    margin: 20px 0 24px 0;
    line-height: 1.5;
    font-size: 15px;
}

.reward-success {
    background: #e6f9ed;
    color: #147029;
    border: 1px solid #bbf2c7;
}

.reward-try-again {
    background: var(--osmand-orange-bg);
    color: #9a4a00;
    border: 1px solid rgba(244, 124, 32, 0.25);
}

.score{
    font-size: 64px;
    font-weight: 800;
    color: var(--osmand-orange);
    margin: 16px 0;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}


.language-selector {
    max-width: 500px;
    margin: 0 auto 22px auto;
    text-align: left;
}

body[dir="rtl"] .language-selector,
body[dir="rtl"] .deadline-box,
body[dir="rtl"] .email-form {
    text-align: right;
}

.language-selector label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-dark);
}

.language-selector select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background-color: white;
    font-size: 15px;
    outline: none;
}

body[dir="rtl"] .email-form input[type="email"] {
    direction: ltr;
    text-align: left;
}

@media(max-width:700px){
    .container{ padding: 24px 16px; margin: 0; border-radius: 0; min-height: 100vh; }
    .quiz-header { flex-direction: column; text-align: center; gap: 12px; }
    h1 { font-size: 22px; }
}
</style>

            <h1 id="headerTitle"></h1>
            <p class="subtitle" id="headerSubtitle"></p>

        <div class="progress" id="progress"></div>
    </div>

    <div class="start-screen" id="startScreen">
        <div class="language-selector">
            <label for="languageSelect" id="languageLabel"></label>
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="it">Italiano</option>
                <option value="nl">Nederlands</option>
                <option value="pl">Polski</option>
                <option value="pt">Português</option>
                <option value="tr">Türkçe</option>
                <option value="uk">Українська</option>
                <option value="ar">العربية</option>
            </select>
        </div>
        <div class="mascot-box">🎁</div>
        <h1 id="startTitle"></h1>
        <p class="start-description" id="startDescription"></p>
        <div class="deadline-box">
            <div><strong id="rewardsTitle"></strong></div>
            <div id="rewardThree"></div>
            <div id="rewardOne"></div>
            <br>
            <div id="deadlineText"></div>
        </div>
        <div class="email-form">
            <label for="userEmail" id="emailLabel"></label>
            <input type="email" id="userEmail" placeholder="name@example.com" autocomplete="email" required>
            <p class="email-note" id="privacyNote"></p>
            <div class="form-error" id="emailError"></div>
        </div>
        <button class="action-btn" id="startButton" onclick="startQuiz()"></button>
    </div>

    <div id="quiz" style="display: none;"></div>

    <div class="result-screen" id="resultScreen" style="display: none;">
        <div class="mascot-box" id="mascotResultContainer">🎁</div>
        <h1 id="resultTitle"></h1>
        <div class="score" id="score"></div>
        <p id="resultDefault" style="color: var(--text-muted); font-size: 16px; margin-bottom: 24px;"></p>
        <button class="action-btn" id="restartButton" onclick="restartQuiz()"></button>
    </div>

</div>

    langFromUrl && QUESTION_BANK[langFromUrl]
        ? langFromUrl
        : localStorage.getItem("osmandBirthdayQuizLanguage") || "en";

localStorage.setItem("osmandBirthdayQuizLanguage", selectedLanguage);

let questions = QUESTION_BANK[selectedLanguage] || QUESTION_BANK.en;

function getUi() {
    return UI_TRANSLATIONS[selectedLanguage] || UI_TRANSLATIONS.en;
}

function t(key) {
    const ui = getUi();
    return (ui && ui[key]) || UI_TRANSLATIONS.en[key] || key;
}

function formatText(template, values) {
    return String(template).replace(/\{(\w+)\}/g, (_, key) => values[key] ?? "");
}

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function applyLanguage() {
    questions = QUESTION_BANK[selectedLanguage] || QUESTION_BANK.en;
    const isRtl = selectedLanguage === "ar";
    document.documentElement.lang = selectedLanguage;
    document.documentElement.dir = isRtl ? "rtl" : "ltr";
    document.body.dir = isRtl ? "rtl" : "ltr";
    document.title = t("headerTitle");

    const langSelect = document.getElementById("languageSelect");
    if (langSelect) langSelect.value = selectedLanguage;

    document.getElementById("headerTitle").innerHTML = t("headerTitle");
    document.getElementById("headerSubtitle").innerHTML = t("headerSubtitle");
    document.getElementById("languageLabel").innerHTML = t("languageLabel");
    document.getElementById("startTitle").innerHTML = t("startTitle");
    document.getElementById("startDescription").innerHTML = t("startDescription");
    document.getElementById("rewardsTitle").innerHTML = t("rewardsTitle");

}

function isValidEmail(email) {
    const atIndex = email.indexOf("@");
    const dotIndex = email.lastIndexOf(".");
    return atIndex > 0 && dotIndex > atIndex + 1 && dotIndex < email.length - 1;
}

function checkEmailAlreadyRegistered(email) {
    return new Promise((resolve) => {
        if (!GOOGLE_SHEETS_WEB_APP_URL || GOOGLE_SHEETS_WEB_APP_URL.includes("PASTE_YOUR")) {
            resolve({ ok: false, exists: false, localOnly: true });
            return;
        }

        const callbackName = "osmandQuizEmailCheck_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const timeout = setTimeout(() => {
            cleanup();
            resolve({ ok: false, exists: false, error: "timeout" });
        }, 10000);

        function cleanup() {
            clearTimeout(timeout);
            delete window[callbackName];
            if (script.parentNode) {
                script.parentNode.removeChild(script);
            }
        }

        window[callbackName] = function(response) {
            cleanup();
            resolve(response || { ok: false, exists: false });
        };

        script.onerror = function() {
            cleanup();
            resolve({ ok: false, exists: false, error: "network" });
        };

        script.src = GOOGLE_SHEETS_WEB_APP_URL
            + "?action=checkEmail"
            + "&email=" + encodeURIComponent(email)
            + "&callback=" + encodeURIComponent(callbackName);

        document.body.appendChild(script);
    });
}

async function saveQuizRegistration(result) {
    const registrations = JSON.parse(localStorage.getItem("osmandBirthdayQuizRegistrations") || "[]");
    registrations.push(result);
    localStorage.setItem("osmandBirthdayQuizRegistrations", JSON.stringify(registrations));

    if (!GOOGLE_SHEETS_WEB_APP_URL || GOOGLE_SHEETS_WEB_APP_URL.includes("PASTE_YOUR")) {
        console.warn("Google Sheets Web App URL is not configured yet. Result saved locally only.", result);
        return { ok: false, localOnly: true };
    }

    try {
        await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(result)
        });
        return { ok: true };
    } catch (error) {
        console.error("Could not submit quiz result to Google Sheets:", error);
        return { ok: false, error };
    }
}

async function startQuiz() {
    const emailInput = document.getElementById("userEmail");
    const emailError = document.getElementById("emailError");
    const startButton = document.getElementById("startButton");
    const email = emailInput.value.trim().toLowerCase();

    if(!isValidEmail(email)) {
        emailError.textContent = t("invalidEmail");
        emailError.style.display = "block";
        emailInput.focus();
        return;
    }

    startButton.disabled = true;
    startButton.textContent = t("checkingEmail");
    emailError.style.display = "none";

    const emailCheck = await checkEmailAlreadyRegistered(email);

    startButton.disabled = false;
    startButton.textContent = t("startQuiz");

    if(!emailCheck.ok) {
        emailError.textContent = t("networkError");
        emailError.style.display = "block";
        emailInput.focus();
        return;
    }

    if(emailCheck.exists) {
        emailError.textContent = t("emailUsed");
        emailError.style.display = "block";
        emailInput.focus();
        return;
    }

    registeredEmail = email;
    quizTrack('birthday/start');
    emailError.style.display = "none";
    startScreen.style.display = "none";
    quizHeader.style.display = "flex";
    progressWrapper.style.display = "block";
    quiz.style.display = "block";
    renderQuestion();
    sendIframeHeight();
}

    <div class="question-number">${formatText(t("questionOf"), { current: currentQuestion + 1, total: questions.length })}</div>
    <div class="question-title">${q.title}</div>
    <div class="question-hint">${q.hint}</div>
    `;

    if(q.questionImg && q.questionImg !== "") {
        html += `
        <div class="hint-image-wrapper">
            <img src="${q.questionImg}" alt="Question Hint Interface">
        </div>
        `;
    }

    if(q.type === "single" || q.type === "multi"){
        q.options.forEach((option,index)=>{
            html += `
            <div class="option" data-index="${index}">
            ${option}
            </div>
            `;
        });
        html += `<div class="answer-warning" id="answerWarning" role="alert" aria-live="polite">${t("selectAnswer")}</div>`;
        html += `<button class="action-btn" onclick="submitChoice()">${t("submitAnswer")}</button>`;
    }

    if(q.type === "matching"){
        const rightSide = [...q.pairs.map(p=>p[1])].sort(()=>Math.random()-0.5);
        q.pairs.forEach((pair)=>{
            html += `
            <div class="match-row">
            <strong>${pair[0]}</strong>
            <select data-answer="${pair[1]}">
            <option value="">Select match...</option>
            ${rightSide.map(item=>`<option value="${item}">${item}</option>`).join("")}
            </select>
            </div>
            `;
        });
        html += `<div class="answer-warning" id="answerWarning" role="alert" aria-live="polite">${t("selectAnswer")}</div>`;
        html += `<button class="action-btn" onclick="submitMatching()">${t("submitAnswer")}</button>`;
    }

    if(q.type === "sequence"){
        q.steps.forEach((step,index)=>{
            html += `
            <div class="sequence-item">
            <select class="seq-select" data-index="${index}">
            <option value="">No.</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            </select>
            <div>${step}</div>
            </div>
            `;
        });
        html += `<div class="answer-warning" id="answerWarning" role="alert" aria-live="polite">${t("selectAnswer")}</div>`;
        html += `<button class="action-btn" onclick="submitSequence()">${t("submitAnswer")}</button>`;
    }

    html += `<div id="feedback"></div>`;
    quiz.innerHTML = html;
    attachOptionEvents(q.type);
    sendIframeHeight();
}

function clearAnswerWarning(){
    const warning = document.getElementById("answerWarning");
    if(warning) {
        warning.style.display = "none";
    }
}

function showAnswerWarning(){
    const warning = document.getElementById("answerWarning");
    if(warning) {
        warning.textContent = t("selectAnswer");
        warning.style.display = "block";
        warning.setAttribute("tabindex", "-1");
        warning.focus({ preventScroll: true });
        warning.scrollIntoView({ behavior: "smooth", block: "nearest" });
    } else {
        alert(t("selectAnswer"));
    }
    sendIframeHeight();
}

function attachOptionEvents(type){
    const options = document.querySelectorAll(".option");
    options.forEach(option=>{
        option.addEventListener("click",()=>{
            clearAnswerWarning();
            if(type === "single"){
                options.forEach(o=>o.classList.remove("selected"));
            }
            option.classList.toggle("selected");
        });
    });

    const selects = quiz.querySelectorAll("select");
    selects.forEach(select=>{
        select.addEventListener("change", clearAnswerWarning);
    });
}

function arraysEqual(a,b){
    return JSON.stringify(a.sort()) === JSON.stringify(b.sort());
}

function submitChoice(){
    const q = questions[currentQuestion];
    const selected = [...document.querySelectorAll(".option.selected")].map(el=>Number(el.dataset.index));
    if (selected.length === 0) {
        showAnswerWarning();
        return;
    }
    const correct = arraysEqual(selected,q.correct);
    if(correct) score++;
    showFeedback(correct,q.feedback);
}

function submitMatching(){
    const selects = quiz.querySelectorAll("select");
    let anyEmpty = false;
    let correct = true;
    selects.forEach(select=>{
        if(!select.value) anyEmpty = true;
        if(select.value !== select.dataset.answer) correct = false;
    });
    if(anyEmpty) {
        showAnswerWarning();
        return;
    }
    if(correct) score++;
    showFeedback(correct,questions[currentQuestion].feedback);
}

function submitSequence(){
    const selects = document.querySelectorAll(".seq-select");
    const q = questions[currentQuestion];
    let anyEmpty = false;
    let correct = true;
    
    selects.forEach(select => {
        if(!select.value) anyEmpty = true;
        const idx = Number(select.dataset.index);
        if(select.value !== q.correctSequence[idx]) {
            correct = false;
        }
    });
    
    if(anyEmpty) {
        showAnswerWarning();
        return;
    }
    if(correct) score++;
    showFeedback(correct,q.feedback);
}

function showFeedback(correct,text){
    quizTrack('birthday/q/' + (currentQuestion + 1) + '/' + (correct ? 'correct' : 'wrong'));
    const feedback = document.getElementById("feedback");
    feedback.className = correct ? "feedback correct" : "feedback wrong";
    const isLastQuestion = currentQuestion === questions.length - 1;

    // Інтерактивна зміна емоцій: телескоп перетворюється на оцінку
    if(correct) {
        mascotContainer.innerHTML = "👍";
        mascotContainer.style.borderColor = "var(--correct-green)";
        mascotContainer.style.background = "#e6f9ed";
    } else {
        mascotContainer.innerHTML = "😔";
        mascotContainer.style.borderColor = "var(--wrong-red)";
        mascotContainer.style.background = "#fdf2f2";
    }

    feedback.innerHTML = `
    <strong>${correct ? t("correct") : t("incorrect")}</strong>
    ${text}
    <button class="action-btn" style="margin-top:20px; background: ${correct ? '#34c759' : '#ff3b30'}; box-shadow: none;" onclick="nextQuestion()">
        ${isLastQuestion ? t("viewResults") : t("nextQuestion")}
    </button>
    `;
    
    const mainBtn = document.querySelector(".question > button.action-btn");
    if(mainBtn) mainBtn.style.display = 'none';
    sendIframeHeight();
}


async function activateOsmAndPro(email, rewardMonths) {
    const promoKey = PROMO_KEYS[rewardMonths];

    if (!promoKey) {
        return {
            ok: false,
            message: "No promo key for this reward."
        };
    }

    try {
        const url = OSMAND_PROMO_ENDPOINT_URL
            + "?promoKey=" + encodeURIComponent(promoKey)
            + "&userEmail=" + encodeURIComponent(email);

        const response = await fetch(url, {
            method: "POST"
        });

        const text = await response.text();

        if (!response.ok) {
            return {
                ok: false,
                message: text || "Could not activate OsmAnd Pro automatically."
            };
        }

        return {
            ok: true,
            message: text
        };
    } catch (error) {
        return {
            ok: false,
            message: String(error.message || error)
        };
    }
}

function getManualUrlForLanguage(lang) {
    const baseUrl = "https://osmand.net/promo/manual/";
    const manualAnchors = {
        en: "#english-version",
        de: "#deutsche-version",
        es: "#versi%C3%B3n-en-espa%C3%B1ol",
        fr: "#version-fran%C3%A7aise",
        it: "#versione-italiana",
        nl: "#nederlandse-versie",
        pl: "#polska-wersija",
        pt: "#vers%C3%A3o-em-portugu%C3%AAs",
        tr: "#t%C3%BCrk%C3%A7e-versiyon",
        uk: "#%D1%83%D0%BA%D1%80%D0%B0%D1%97%D0%BD%D1%81%D1%8C%D0%BA%D0%B0-%D0%B2%D0%B5%D1%80%D1%81%D1%96%D1%8F",
        ar: "#%D8%A7%D9%84%D9%86%D8%B3%D8%AE%D8%A9-%D8%A7%D9%84%D8%B9%D8%B1%D8%A8%D9%8A%D8%A9"
    };

    return baseUrl + (manualAnchors[lang] || manualAnchors.en);
}

async function nextQuestion(){
    currentQuestion++;
    if(currentQuestion >= questions.length){
        const percentScore = score / questions.length;
        const percentageText = Math.round(percentScore * 100);

        let rewardMonths = 0;
        let rewardLabel = t("noReward");

        if (score >= rewardThreeMonthsCorrectAnswers) {
            rewardMonths = 3;
            rewardLabel = t("threeMonths");
        } else if (score >= rewardOneMonthCorrectAnswers) {
            rewardMonths = 1;
            rewardLabel = t("oneMonth");
        }

        const isEligible = rewardMonths > 0;

        quizTrack('birthday/finish?score=' + score + '&total=' + questions.length);

        const restartButton = document.querySelector("#resultScreen button.action-btn");

        if (restartButton) {
            restartButton.style.display = isEligible ? "none" : "block";
        }

        mascotResultContainer.innerHTML = isEligible ? "🎁" : "😔";

        if (isEligible) {
            mascotResultContainer.style.borderColor = "var(--correct-green)";
            mascotResultContainer.style.background = "#e6f9ed";
        } else {
            mascotResultContainer.style.borderColor = "var(--wrong-red)";
            mascotResultContainer.style.background = "#fdf2f2";
        }

        let activationStatus = "NOT_ELIGIBLE";
        let activationMessage = "";

        if (isEligible) {
            const activationResult = await activateOsmAndPro(registeredEmail, rewardMonths);

            if (activationResult.ok) {
                activationStatus = "ACTIVATED";
                activationMessage = activationResult.message;
            } else {
                activationStatus = "ACTIVATION_ERROR";
                activationMessage = activationResult.message;
            }
        }

        const saveStatus = await saveQuizRegistration({
            email: registeredEmail,
            language: selectedLanguage,
            score: score,
            total: questions.length,
            percentage: percentageText,
            rewardMonths: rewardMonths,
            rewardLabel: rewardLabel,
            eligibleForOsmAndPro: isEligible,
            activationStatus: activationStatus,
            activationMessage: activationMessage,
            completedAt: new Date().toISOString(),
            source: "OsmAnd Birthday Quiz"
        });

        document.getElementById("quizHeader").style.display = "none";
        document.getElementById("quiz").style.display = "none";
        document.getElementById("resultScreen").style.display = "block";
        document.getElementById("progress").style.width = "100%";
        document.getElementById("score").innerText = `${score} / ${questions.length}`;

        const resultText = document.querySelector("#resultScreen p");
        const submittedText = saveStatus.localOnly
            ? t("submittedLocal")
            : t("submitted");

        const resultTokens = {
            score: score,
            total: questions.length,
            percentage: percentageText,
            rewardLabel: escapeHtml(rewardLabel),
            email: escapeHtml(registeredEmail),
            manualUrl: escapeHtml(getManualUrlForLanguage(selectedLanguage)),
            submittedText: submittedText,
            activationMessage: escapeHtml(activationMessage)
        };

        if (activationStatus === "ACTIVATED") {
            resultText.outerHTML = `
                <div class="reward-box reward-success">
                    ${formatText(t("successResult"), resultTokens)}
                </div>
            `;
        } else if (activationStatus === "ACTIVATION_ERROR") {
            resultText.outerHTML = `
                <div class="reward-box reward-try-again">
                    ${formatText(t("activationErrorResult"), resultTokens)}
                </div>
            `;
        } else {
            resultText.outerHTML = `
                <div class="reward-box reward-try-again">
                    ${formatText(t("notEligibleResult"), resultTokens)}
                </div>
            `;
        }

        sendIframeHeight();
        return;
    }
    renderQuestion();
}

function restartQuiz(){
    currentQuestion = 0;
    score = 0;
    registeredEmail = "";
    document.getElementById("quizHeader").style.display = "none";
    document.getElementById("progressWrapper").style.display = "none";
    document.getElementById("quiz").style.display = "none";
    document.getElementById("resultScreen").style.display = "none";
    document.getElementById("score").innerText = "";
    document.getElementById("userEmail").value = "";

    const existingReward = document.querySelector("#resultScreen .reward-box");
    if(existingReward) {
        existingReward.outerHTML = '<p id="resultDefault" style="color: var(--text-muted); font-size: 16px; margin-bottom: 24px;">' + t("resultDefault") + '</p>';
    }

    const restartButton = document.querySelector("#resultScreen button.action-btn");

    if (restartButton) {
        restartButton.style.display = "block";
    }

    startScreen.style.display = "block";
    sendIframeHeight();
}

function sendIframeHeight() {
    window.parent.postMessage(
        {
            type: "osmandQuizContentChanged"
        },
        window.location.origin
    );
}

window.addEventListener("load", function(){ applyLanguage(); sendIframeHeight(); });
window.addEventListener("resize", sendIframeHeight);

setTimeout(sendIframeHeight, 300);
setTimeout(sendIframeHeight, 1000);
setTimeout(sendIframeHeight, 2000);
</script>
